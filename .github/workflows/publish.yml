name: Publish to PyPI

# Runs when a version tag is pushed (e.g. v0.1.0, v0.2.0, v1.0.0).
# Builds the wheel + sdist, then uploads via Trusted Publishing.
# No API tokens, no secrets — PyPI verifies this workflow's OIDC identity.

on:
  push:
    tags:
      - 'v*'

# OIDC token permission is required for Trusted Publishing.
permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/neograph/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `with:` block needed — Trusted Publishing uses OIDC.
        # PyPI verifies this workflow matches the configured publisher.
