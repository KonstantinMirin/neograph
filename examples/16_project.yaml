# Project surface — type definitions for the security analysis pipeline.
# In production this file would be generated by the LLM alongside the spec.

types:
  ScanResult:
    properties:
      files_scanned:
        type: integer
      findings:
        type: array
        items:
          type: string
      severity_counts:
        type: string

  AnalysisResult:
    properties:
      vulnerabilities:
        type: array
        items:
          type: string
      risk_score:
        type: number
      iteration:
        type: integer
      summary:
        type: string

  Recommendation:
    properties:
      actions:
        type: array
        items:
          type: string
      priority:
        type: string
      risk_score:
        type: number
