# Pipeline spec — as if generated by an LLM via tool calling.
#
# Four-stage security analysis:
#   1. scan     — inventory the codebase and flag raw findings
#   2. assess   — convert raw scan findings into a scored analysis
#   3. refine   — iteratively refine the analysis (loops until risk_score < 0.3)
#   4. recommend — produce prioritised remediation actions
#
# The refine node uses a Loop modifier: it iteratively re-evaluates the
# analysis, eliminating false positives each pass until the risk score
# drops below the threshold.

name: security-analysis

nodes:
  - name: scan
    mode: scripted
    scripted_fn: scan_codebase
    outputs: ScanResult

  - name: assess
    mode: scripted
    scripted_fn: initial_assessment
    inputs:
      scan: ScanResult
    outputs: AnalysisResult

  - name: refine
    mode: scripted
    scripted_fn: refine_analysis
    outputs: AnalysisResult
    loop:
      when: "risk_score >= 0.3"
      max_iterations: 5

  - name: recommend
    mode: scripted
    scripted_fn: generate_recommendations
    inputs:
      refine: AnalysisResult
    outputs: Recommendation

pipeline:
  nodes:
    - scan
    - assess
    - refine
    - recommend
